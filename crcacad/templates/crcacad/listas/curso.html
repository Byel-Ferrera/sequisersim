{% extends 'crcacad/base.html' %}

{% block content %}
<h1>Lista de Cursos</h1>
<a href="{% url 'crcacad:criar_cursos' %}" class="btn btn-success mb-3">Criar Curso</a>
<ul>
    {%for curso in cursos%}
        <li>
            {{ curso.nome }} - {{ curso.descricao }}
        </li>
        <td>
            <a href="{% url 'crcacad:editar_curso' curso.nome %}" class="btn btn-primary btn-sm">Editar</a>
            <a href="{% url 'crcacad:excluir_curso' curso.nome %}" class="btn btn-danger btn-sm">Excluir</a>
        </td>
    {%endfor%}
</ul>
{% endblock %}
